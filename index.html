<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan-Chat Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">Connecting to Lan-Chat...</div>

    <!-- Lock Screen -->
    <div id="lockScreen">
        <h2>Entire chat locked</h2>
        <p>Under maintenance</p>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div id="chat"></div>

        <!-- Message Input Area -->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." />
            <button id="sendBtn">Send</button>
        </div>

        <!-- Name Change Area -->
        <div class="name-area">
            <input type="text" id="nameInput" placeholder="Change name..." />
            <button id="nameBtn">Change</button>
        </div>
    </div>

    <!-- Channels -->
    <div id="channels">
        <button data-channel="public-chat" onclick="switchChannel('public-chat')">Public</button>
        <button data-channel="private-1" onclick="switchChannel('private-1')">Private 1</button>
        <button data-channel="private-2" onclick="switchChannel('private-2')">Private 2</button>
    </div>

    <script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
    <script src="script.js"></script>
</body>
</html>
